# Production profile — secure defaults

# CORS — MUST be overridden for your domain
stellar.grooves.cors.allowedOrigins=${CORS_ALLOWED_ORIGINS:}

# Rate limiter — trust proxy headers behind a load balancer
stellar.grooves.rateLimit.trustProxy=${RATE_LIMIT_TRUST_PROXY:true}
stellar.grooves.rateLimit.trustedProxies=${RATE_LIMIT_TRUSTED_PROXIES:127.0.0.1,::1}

# Disable Swagger/OpenAPI in production
stellar.grooves.swagger.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging
logging.level.com.stellarideas.grooves=INFO
logging.level.org.springframework.security=WARN
