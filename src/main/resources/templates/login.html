<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Grooves - Login</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="card">
                <div class="card-body p-4">
                    <div class="logo-container">
                        <img th:src="@{/images/logo.png}" alt="Stellar Grooves Logo" style="height:80px;width:auto;">
                        <h2 class="auth-title mt-2">Stellar Grooves</h2>
                        <p class="auth-subtitle">Sign in to your music library</p>
                    </div>

                    <div th:if="${param.error}" class="alert alert-danger" role="alert">
                        Invalid username or password.
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success" role="alert">
                        You have been signed out.
                    </div>

                    <form th:action="@{/login}" method="post" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" name="username" class="form-control"
                                   required autofocus autocomplete="username">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" name="password" class="form-control"
                                   required autocomplete="current-password">
                        </div>
                        <button class="btn btn-primary w-100 mt-1" type="submit">Sign In</button>
                    </form>

                    <p class="text-center mt-3 mb-0" style="font-size: 0.88rem; color: var(--text-secondary)">
                        Don't have an account? <a href="/signup">Sign Up</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
