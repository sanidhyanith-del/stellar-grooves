<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf.token}">
    <meta name="_csrf_header" th:content="${_csrf.headerName}">
    <title>Stellar Grooves - Admin</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-3">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/images/stellar-grooves-logo-nav.svg}" alt="Stellar Grooves" class="navbar-logo">
            </a>
            <div class="ms-auto d-flex gap-3 align-items-center">
                <button class="theme-toggle" id="themeToggle" title="Toggle light/dark mode" aria-label="Toggle theme">&#9788;</button>
                <a class="nav-link d-inline" th:href="@{/}">Library</a>
                <a class="nav-link d-inline active" href="#">Admin</a>
                <a class="nav-link d-inline" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-4">
                <div class="card stat-card">
                    <div class="stat-value" id="statUsers">-</div>
                    <div class="stat-label">Users</div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card stat-card">
                    <div class="stat-value" id="statFiles">-</div>
                    <div class="stat-label">Total Files</div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card stat-card">
                    <div class="stat-value" id="statPlaylists">-</div>
                    <div class="stat-label">Playlists</div>
                </div>
            </div>
        </div>

        <!-- User table -->
        <div class="card">
            <div class="card-header">User Management</div>
            <div class="table-responsive">
                <table class="table" aria-label="Users">
                    <thead>
                        <tr>
                            <th scope="col">Username</th>
                            <th scope="col" class="hide-xs">Email</th>
                            <th scope="col">Roles</th>
                            <th scope="col" class="text-end">Files</th>
                            <th scope="col" class="hide-xs">Status</th>
                            <th scope="col"></th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center px-3 py-2">
                <span id="pageInfo" class="small" style="color: var(--text-muted);"></span>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" id="prevPage" disabled>Prev</button>
                    <button class="btn btn-sm btn-outline-secondary" id="nextPage" disabled>Next</button>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/vendor/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <script th:src="@{/js/admin.js}"></script>
</body>
</html>
