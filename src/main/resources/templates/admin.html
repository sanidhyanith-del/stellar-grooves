<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Grooves - Admin</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <nav class="navbar navbar-expand-lg">
        <div class="container-fluid px-3">
            <a class="navbar-brand" th:href="@{/}">
                <img th:src="@{/images/logo.png}" alt="Stellar Grooves Logo" class="logo-sm">
                Stellar Grooves
            </a>
            <div class="ms-auto d-flex gap-3 align-items-center">
                <a class="nav-link d-inline" th:href="@{/}">Library</a>
                <a class="nav-link d-inline active" href="#">Admin</a>
                <a class="nav-link d-inline" href="/logout">Logout</a>
            </div>
        </div>
    </nav>

    <div class="main-content">
        <!-- Stats -->
        <div class="row g-3 mb-4">
            <div class="col-6 col-md-4">
                <div class="card stat-card">
                    <div class="stat-value" id="statUsers">-</div>
                    <div class="stat-label">Users</div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card stat-card">
                    <div class="stat-value" id="statFiles">-</div>
                    <div class="stat-label">Total Files</div>
                </div>
            </div>
            <div class="col-6 col-md-4">
                <div class="card stat-card">
                    <div class="stat-value" id="statPlaylists">-</div>
                    <div class="stat-label">Playlists</div>
                </div>
            </div>
        </div>

        <!-- User table -->
        <div class="card">
            <div class="card-header">User Management</div>
            <div class="table-responsive">
                <table class="table" aria-label="Users">
                    <thead>
                        <tr>
                            <th scope="col">Username</th>
                            <th scope="col" class="hide-xs">Email</th>
                            <th scope="col">Roles</th>
                            <th scope="col" class="text-end">Files</th>
                            <th scope="col" class="hide-xs">Status</th>
                            <th scope="col"></th>
                        </tr>
                    </thead>
                    <tbody id="usersBody"></tbody>
                </table>
            </div>
            <div class="d-flex justify-content-between align-items-center px-3 py-2">
                <span id="pageInfo" class="small" style="color: var(--text-muted);"></span>
                <div class="d-flex gap-2">
                    <button class="btn btn-sm btn-outline-secondary" id="prevPage" disabled>Prev</button>
                    <button class="btn btn-sm btn-outline-secondary" id="nextPage" disabled>Next</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script>
    (function() {
    'use strict';

    function csrfToken() {
        const match = document.cookie.match(/(?:^|;\s*)XSRF-TOKEN=([^;]*)/);
        return match ? decodeURIComponent(match[1]) : '';
    }
    function csrfHeaders() { return { 'X-XSRF-TOKEN': csrfToken() }; }
    function escapeHtml(str) {
        const d = document.createElement('div');
        d.appendChild(document.createTextNode(str || ''));
        return d.innerHTML;
    }

    let currentPage = 0;
    let totalPages = 0;

    async function loadStats() {
        try {
            const resp = await fetch('/api/v1/admin/stats');
            const data = await resp.json();
            document.getElementById('statUsers').textContent = data.totalUsers;
            document.getElementById('statFiles').textContent = data.totalFiles;
            document.getElementById('statPlaylists').textContent = data.totalPlaylists;
        } catch (e) { console.error(e); }
    }

    async function loadUsers(page) {
        try {
            const resp = await fetch(`/api/v1/admin/users?page=${page}&size=25`);
            const data = await resp.json();
            currentPage = data.page;
            totalPages = data.totalPages;

            const tbody = document.getElementById('usersBody');
            tbody.innerHTML = '';
            data.content.forEach(u => {
                const tr = document.createElement('tr');
                const roles = (u.roles || []).map(r => r.replace('ROLE_', '')).join(', ');
                tr.innerHTML = `
                    <td>${escapeHtml(u.username)}</td>
                    <td class="hide-xs">${escapeHtml(u.email || '')}</td>
                    <td><span class="badge genre-OTHER">${roles}</span></td>
                    <td class="text-end">${u.fileCount || 0}</td>
                    <td class="hide-xs">${u.enabled ? '<span class="status-success">Active</span>' : '<span class="status-error">Disabled</span>'}</td>
                    <td><button class="btn-action-sm btn-action-remove" data-id="${u.id}" data-name="${escapeHtml(u.username)}" aria-label="Delete user ${escapeHtml(u.username)}">&times;</button></td>
                `;
                tbody.appendChild(tr);
            });

            document.getElementById('pageInfo').textContent =
                `Page ${currentPage + 1} of ${Math.max(totalPages, 1)}`;
            document.getElementById('prevPage').disabled = currentPage === 0;
            document.getElementById('nextPage').disabled = currentPage >= totalPages - 1;
        } catch (e) { console.error(e); }
    }

    document.getElementById('usersBody').addEventListener('click', async (e) => {
        const btn = e.target.closest('[data-id]');
        if (!btn) return;
        const id = btn.dataset.id;
        const name = btn.dataset.name;
        if (!confirm(`Delete user "${name}" and all their data? This cannot be undone.`)) return;
        btn.disabled = true;
        try {
            const resp = await fetch(`/api/v1/admin/users/${id}`, { method: 'DELETE', headers: csrfHeaders() });
            if (resp.ok) {
                await loadStats();
                await loadUsers(currentPage);
            }
        } finally { btn.disabled = false; }
    });

    document.getElementById('prevPage').addEventListener('click', () => {
        if (currentPage > 0) loadUsers(currentPage - 1);
    });
    document.getElementById('nextPage').addEventListener('click', () => {
        if (currentPage < totalPages - 1) loadUsers(currentPage + 1);
    });

    loadStats();
    loadUsers(0);
    })();
    </script>
</body>
</html>
