<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#ff3b1f">
    <title>Stellar Grooves - Sign Up</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="apple-touch-icon" th:href="@{/images/icon-192.png}">
    <link rel="manifest" th:href="@{/manifest.json}">
    <link rel="stylesheet" th:href="@{/vendor/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="card">
                <div class="card-body p-4">
                    <div class="logo-container">
                        <img th:src="@{/images/stellar-grooves-logo.svg}" alt="Stellar Grooves" style="height:auto; width:100%; max-width:360px;">
                        <p class="auth-subtitle mt-2">Create your account</p>
                    </div>

                    <div id="message" class="alert d-none" role="alert"></div>

                    <form id="signupForm" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" class="form-control"
                                   minlength="3" maxlength="20" required autocomplete="username"
                                   placeholder="3–20 characters">
                            <div class="invalid-feedback">Username must be 3–20 characters.</div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" id="email" class="form-control"
                                   required autocomplete="email">
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control"
                                   minlength="8" required autocomplete="new-password"
                                   placeholder="Min 8 chars, upper + lower + digit">
                            <div class="invalid-feedback">Password must be at least 8 characters with uppercase, lowercase, and a digit.</div>
                        </div>
                        <button class="btn btn-primary w-100 mt-1" type="submit" id="registerBtn">
                            <span id="registerSpinner" class="spinner-border spinner-border-sm me-1 d-none" role="status"></span>
                            Create Account
                        </button>
                    </form>

                    <p class="text-center mt-3 mb-0 text-secondary-themed">
                        Already have an account? <a href="/login">Sign In</a>
                    </p>
                    <p class="text-center mt-2 mb-0 text-secondary-themed" style="font-size: 0.82rem;">
                        <a href="/help">Help &amp; User Guide</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script th:src="@{/js/signup.js}"></script>
</body>
</html>
