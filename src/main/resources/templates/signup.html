<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stellar Grooves - Sign Up</title>
    <link rel="icon" th:href="@{/images/logo.png}" type="image/png">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" th:href="@{/css/main.css}">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="card">
                <div class="card-body p-4">
                    <div class="logo-container">
                        <img th:src="@{/images/logo.png}" alt="Stellar Grooves Logo" style="height:80px;width:auto;">
                        <h2 class="auth-title mt-2">Stellar Grooves</h2>
                        <p class="auth-subtitle">Create your account</p>
                    </div>

                    <div id="message" class="alert d-none" role="alert"></div>

                    <form id="signupForm" novalidate>
                        <div class="mb-3">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" id="username" class="form-control"
                                   minlength="3" maxlength="20" required autocomplete="username"
                                   placeholder="3–20 characters">
                            <div class="invalid-feedback">Username must be 3–20 characters.</div>
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Email address</label>
                            <input type="email" id="email" class="form-control"
                                   required autocomplete="email">
                            <div class="invalid-feedback">Please enter a valid email address.</div>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" id="password" class="form-control"
                                   minlength="8" required autocomplete="new-password"
                                   placeholder="Minimum 8 characters">
                            <div class="invalid-feedback">Password must be at least 8 characters.</div>
                        </div>
                        <button class="btn btn-primary w-100 mt-1" type="submit" id="registerBtn">
                            <span id="registerSpinner" class="spinner-border spinner-border-sm me-1 d-none" role="status"></span>
                            Create Account
                        </button>
                    </form>

                    <p class="text-center mt-3 mb-0" style="font-size: 0.88rem; color: var(--text-secondary)">
                        Already have an account? <a href="/login">Sign In</a>
                    </p>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const form = e.target;
            const msg  = document.getElementById('message');
            const btn  = document.getElementById('registerBtn');
            const spinner = document.getElementById('registerSpinner');

            // Client-side validation
            if (!form.checkValidity()) {
                form.querySelectorAll(':invalid').forEach(el => el.classList.add('is-invalid'));
                return;
            }
            form.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));

            const username = document.getElementById('username').value.trim();
            const email    = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;

            btn.disabled = true;
            spinner.classList.remove('d-none');
            msg.className = 'alert d-none';

            try {
                const response = await fetch('/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email, password })
                });
                const data = await response.json();

                if (response.ok) {
                    msg.className = 'alert alert-success';
                    // Safe: controlled anchor text, href is a hardcoded path
                    msg.innerHTML = 'Account created! <a href="/login">Sign in here</a>';
                    msg.classList.remove('d-none');
                    form.reset();
                } else {
                    msg.className = 'alert alert-danger';
                    // Use textContent to prevent XSS from server error messages
                    msg.textContent = data.error || 'Registration failed. Please try again.';
                    msg.classList.remove('d-none');
                }
            } catch (err) {
                msg.className = 'alert alert-danger';
                msg.textContent = 'A network error occurred. Please try again.';
                msg.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                spinner.classList.add('d-none');
            }
        });

        // Clear validation state on input
        document.querySelectorAll('.form-control').forEach(input => {
            input.addEventListener('input', () => input.classList.remove('is-invalid'));
        });
    </script>
</body>
</html>
