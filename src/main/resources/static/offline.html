<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#ff3b1f">
  <title>Stellar Grooves - Offline</title>
  <link rel="icon" href="/images/logo.png" type="image/png">
  <style>
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center;
      justify-content: center; background: #070709; color: #e5e7eb;
      font-family: system-ui, -apple-system, sans-serif; text-align: center;
    }
    .offline-card {
      padding: 3rem; border: 1px solid #1f2937; border-radius: 12px;
      background: #111217; max-width: 400px;
    }
    h1 { color: #ffd166; font-size: 1.5rem; margin-bottom: 0.5rem; }
    p { color: #9ca3af; line-height: 1.6; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    button {
      margin-top: 1.5rem; padding: 0.6rem 1.5rem; border: 1px solid #ff3b1f;
      background: transparent; color: #ff3b1f; border-radius: 8px;
      cursor: pointer; font-size: 1rem;
    }
    button:hover { background: rgba(255, 59, 31, 0.1); }
  </style>
</head>
<body>
  <div class="offline-card">
    <div class="icon" aria-hidden="true">&#x1F3B5;</div>
    <h1>You're Offline</h1>
    <p>Stellar Grooves needs a network connection to stream your music library.</p>
    <button onclick="window.location.reload()">Try Again</button>
  </div>
</body>
</html>
