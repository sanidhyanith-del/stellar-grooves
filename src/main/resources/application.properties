# Stellar Grooves MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/stellar_grooves}
spring.data.mongodb.auto-index-creation=true

# MongoDB Timeout Configuration
spring.data.mongodb.connection-timeout=${MONGO_CONNECT_TIMEOUT_MS:10000}
spring.data.mongodb.socket-timeout=${MONGO_SOCKET_TIMEOUT_MS:30000}
spring.data.mongodb.server-selection-timeout=${MONGO_SERVER_SELECTION_TIMEOUT_MS:15000}

# Stellar Grooves JWT Configuration
# REQUIRED: Set JWT_SECRET env var to a Base64-encoded key (minimum 256 bits / 32 bytes)
stellar.grooves.jwtSecret=${JWT_SECRET:}
stellar.grooves.jwtExpirationMs=${JWT_EXPIRATION_MS:900000}
stellar.grooves.refreshTokenExpirationMs=${REFRESH_TOKEN_EXPIRATION_MS:604800000}

# Account Lockout Configuration
stellar.grooves.login.maxFailedAttempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}
stellar.grooves.login.lockoutDurationMinutes=${LOGIN_LOCKOUT_MINUTES:15}

# Server Configuration
server.port=${PORT:8080}
server.address=0.0.0.0

# Request Size Limits
server.tomcat.max-http-form-post-size=2MB
server.tomcat.max-swallow-size=2MB
spring.servlet.multipart.max-file-size=2MB
spring.servlet.multipart.max-request-size=2MB
server.max-http-request-header-size=16KB

# Session Configuration
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

# Thymeleaf Configuration
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Actuator
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=when-authorized

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# Scan Configuration
stellar.grooves.scan.timeoutMinutes=${SCAN_TIMEOUT_MINUTES:5}
stellar.grooves.scan.cooldownSeconds=${SCAN_COOLDOWN_SECONDS:60}
stellar.grooves.scan.perFileTimeoutSeconds=${SCAN_PER_FILE_TIMEOUT_SECONDS:30}
stellar.grooves.scan.fileReaderThreads=${SCAN_FILE_READER_THREADS:2}

# Cover Art Quota (bytes per user, default 500 MB)
stellar.grooves.coverArt.maxBytesPerUser=${COVER_ART_QUOTA_BYTES:524288000}

# Mail Configuration (password reset emails)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
stellar.grooves.mail.from=${MAIL_FROM:noreply@stellargrooves.local}
stellar.grooves.mail.enabled=${MAIL_ENABLED:false}
stellar.grooves.baseUrl=${BASE_URL:http://localhost:8080}

# Logging
logging.level.com.stellarideas.grooves=INFO
logging.level.org.springframework.security=WARN
logging.level.org.jaudiotagger=ERROR
logging.level.AUDIT=INFO
