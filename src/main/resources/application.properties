# Stellar Grooves MongoDB Configuration
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017/stellar_grooves}
spring.data.mongodb.auto-index-creation=true

# MongoDB Timeout Configuration
spring.data.mongodb.connection-timeout=${MONGO_CONNECT_TIMEOUT_MS:10000}
spring.data.mongodb.socket-timeout=${MONGO_SOCKET_TIMEOUT_MS:30000}
spring.data.mongodb.server-selection-timeout=${MONGO_SERVER_SELECTION_TIMEOUT_MS:15000}

# Stellar Grooves JWT Configuration
# REQUIRED: Set JWT_SECRET env var to a Base64-encoded key (minimum 256 bits / 32 bytes)
stellar.grooves.jwtSecret=${JWT_SECRET:}
stellar.grooves.jwtExpirationMs=${JWT_EXPIRATION_MS:900000}
stellar.grooves.refreshTokenExpirationMs=${REFRESH_TOKEN_EXPIRATION_MS:604800000}

# Account Lockout Configuration
stellar.grooves.login.maxFailedAttempts=${LOGIN_MAX_FAILED_ATTEMPTS:5}
stellar.grooves.login.lockoutDurationMinutes=${LOGIN_LOCKOUT_MINUTES:15}

# Server Configuration
server.port=${PORT:8089}
server.address=0.0.0.0

# Request Size Limits
server.tomcat.max-http-form-post-size=2MB
# Multipart caps sized for cover-art uploads (just above coverArt.maxBytesPerImage,
# so the handler's own image-size check produces the user-facing error).
server.tomcat.max-swallow-size=12MB
spring.servlet.multipart.max-file-size=12MB
spring.servlet.multipart.max-request-size=13MB
server.max-http-request-header-size=16KB

# Session Configuration
server.servlet.session.timeout=${SESSION_TIMEOUT:30m}

# Thymeleaf Configuration
spring.thymeleaf.cache=${THYMELEAF_CACHE:true}
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# Actuator
management.endpoints.web.exposure.include=health,metrics,prometheus
management.endpoint.health.show-details=when-authorized
management.metrics.tags.application=stellar-grooves

# OpenAPI / Swagger
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method

# Rate Limiting — shared/public endpoints (stricter, unauthenticated)
stellar.grooves.rateLimit.shared.maxRequests=${RATE_LIMIT_SHARED_MAX:5}
stellar.grooves.rateLimit.shared.windowMs=${RATE_LIMIT_SHARED_WINDOW_MS:60000}

# Rate Limiting — per-user for resource-heavy operations (export, bulk-delete, backup)
stellar.grooves.userRateLimit.maxRequests=${USER_RATE_LIMIT_MAX:10}
stellar.grooves.userRateLimit.windowSeconds=${USER_RATE_LIMIT_WINDOW_SECONDS:60}

# Rate Limiting — admin endpoints (user list, deletions, catalog edits, catalog reload)
stellar.grooves.adminRateLimit.maxRequests=${ADMIN_RATE_LIMIT_MAX:20}
stellar.grooves.adminRateLimit.windowSeconds=${ADMIN_RATE_LIMIT_WINDOW_SECONDS:60}

# Scan Configuration
stellar.grooves.scan.timeoutMinutes=${SCAN_TIMEOUT_MINUTES:5}
stellar.grooves.scan.cooldownSeconds=${SCAN_COOLDOWN_SECONDS:60}
stellar.grooves.scan.perFileTimeoutSeconds=${SCAN_PER_FILE_TIMEOUT_SECONDS:30}
stellar.grooves.scan.fileReaderThreads=${SCAN_FILE_READER_THREADS:2}
stellar.grooves.scan.supportedExtensions=${SCAN_SUPPORTED_EXTENSIONS:.mp3,.m4a,.flac}
stellar.grooves.scan.batchSize=${SCAN_BATCH_SIZE:200}
stellar.grooves.scan.hardMaxDepth=${SCAN_HARD_MAX_DEPTH:50}
# Optional allowlist — comma-separated absolute paths. When set, scan paths
# must resolve under one of these directories; when empty, a blocklist of
# sensitive system paths applies instead.
stellar.grooves.scan.allowedBaseDirs=${SCAN_ALLOWED_BASE_DIRS:}

# Search
stellar.grooves.search.maxQueryLength=${SEARCH_MAX_QUERY_LENGTH:200}

# Export
stellar.grooves.export.maxSize=${EXPORT_MAX_SIZE:50000}

# Transcode
stellar.grooves.transcode.timeoutSeconds=${TRANSCODE_TIMEOUT_SECONDS:300}
stellar.grooves.transcode.maxFileSize=${TRANSCODE_MAX_FILE_SIZE:524288000}

# Playback Queue
stellar.grooves.queue.maxTracks=${QUEUE_MAX_TRACKS:5000}

# Smart Playlists
stellar.grooves.smartPlaylist.materializeMax=${SMART_PLAYLIST_MATERIALIZE_MAX:5000}
# Per-query execution timeout passed to MongoDB (maxTime).
stellar.grooves.smartPlaylist.queryTimeoutSeconds=${SMART_PLAYLIST_QUERY_TIMEOUT_SECONDS:10}

# Trash retention — soft-deleted files are permanently purged after this many days.
# Purge runs on the configured cron (default 3am daily). Set retentionDays=0 to disable purging.
stellar.grooves.trash.retentionDays=${TRASH_RETENTION_DAYS:30}
stellar.grooves.trash.purgeCron=${TRASH_PURGE_CRON:0 0 3 * * *}

# Cover Art
stellar.grooves.coverArt.maxBytesPerImage=${COVER_ART_MAX_BYTES_PER_IMAGE:10485760}
stellar.grooves.coverArt.maxBytesPerUser=${COVER_ART_QUOTA_BYTES:524288000}
# Global ceiling across all users. Default 10 GB. Set to 0 to disable.
stellar.grooves.coverArt.maxBytesGlobal=${COVER_ART_GLOBAL_QUOTA_BYTES:10737418240}
# When a track has no embedded art, fall back to a sidecar image in the same
# directory (cover/folder/front/albumart…). Local-only, no network. Set false to disable.
stellar.grooves.coverArt.folderImageEnabled=${COVER_ART_FOLDER_IMAGE_ENABLED:true}

# Optional online cover-art fetch (MusicBrainz/Cover Art Archive, then iTunes).
# OFF by default: enabling it sends your album/artist names to third-party services.
stellar.grooves.coverArt.external.enabled=${COVER_ART_EXTERNAL_ENABLED:false}
# Provider order (comma-separated): musicbrainz, itunes.
stellar.grooves.coverArt.external.providers=${COVER_ART_EXTERNAL_PROVIDERS:musicbrainz,itunes}
# Contact (email/URL) embedded in the MusicBrainz User-Agent, per their API etiquette.
stellar.grooves.coverArt.external.contact=${COVER_ART_EXTERNAL_CONTACT:stellar-grooves@example.com}
# Minimum gap between external lookups, ms (MusicBrainz asks for ~1 req/s).
stellar.grooves.coverArt.external.rateLimitMs=${COVER_ART_EXTERNAL_RATE_LIMIT_MS:1100}
# Max albums processed per fetch run.
stellar.grooves.coverArt.external.maxAlbumsPerRun=${COVER_ART_EXTERNAL_MAX_ALBUMS:200}
# Don't re-query an album that recently came up empty for this many days.
stellar.grooves.coverArt.external.retryAfterDays=${COVER_ART_EXTERNAL_RETRY_DAYS:30}

# Mail Configuration (password reset emails)
spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=${MAIL_SMTP_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_SMTP_STARTTLS:true}
# Email Verification (requires mail to be enabled)
stellar.grooves.email.verificationRequired=${EMAIL_VERIFICATION_REQUIRED:false}

stellar.grooves.mail.from=${MAIL_FROM:noreply@stellargrooves.local}
stellar.grooves.mail.enabled=${MAIL_ENABLED:false}
stellar.grooves.baseUrl=${BASE_URL:http://localhost:8089}

# Demo mode — for a public "try it" instance. When true, self-signup is
# disabled and the login page surfaces (and pre-fills) the shared demo
# credentials so visitors land on the seeded account instead of an empty one.
stellar.grooves.demoMode=${DEMO_MODE:false}
stellar.grooves.demo.username=${DEMO_USERNAME:demo}
stellar.grooves.demo.password=${DEMO_PASSWORD:GrooveDemo1}

# Application Version (injected by Maven at build time)
app.version=@project.version@

# Logging
logging.level.com.stellarideas.grooves=INFO
logging.level.org.springframework.security=WARN
logging.level.org.jaudiotagger=ERROR
logging.level.AUDIT=INFO
