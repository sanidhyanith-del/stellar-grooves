services:
  app:
    build: .
    ports:
      - "8089:8089"
    environment:
      MONGO_URI: mongodb://mongo:27017/stellar_grooves
      JWT_SECRET: "${JWT_SECRET:?JWT_SECRET is required - generate with openssl rand -base64 32}"
      # prod keeps file-logging off (this container is read-only) and applies
      # secure defaults. Override per env for local work if you need Swagger etc.
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-prod}
      # Required under the prod profile. Defaults to localhost; set to your
      # public origin(s), comma-separated, e.g. https://grooves.example.com
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:8089,http://127.0.0.1:8089}
      MAIL_ENABLED: "false"
    volumes:
      - ${MUSIC_DIR:-./music}:/music:ro
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.adminCommand('ping')" --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - SETUID
      - SETGID
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G
        reservations:
          cpus: "0.25"
          memory: 256M

  # Optional: Redis for distributed rate limiting
  # Uncomment to enable Redis-backed rate limiting
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - "6379:6379"
  #   restart: unless-stopped

volumes:
  mongo-data:
